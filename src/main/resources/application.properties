spring.application.name=sovereign-cli
spring.shell.interactive.enabled=true

# Suppress LangChain4j internal stack traces on retriable errors (rate limits, 503s).
# These are retried automatically — the full trace just clutters the CLI output.
logging.level.dev.langchain4j.internal.RetryUtils=ERROR
logging.level.dev.langchain4j.internal.ExceptionMapper=ERROR

# Security defaults
eurocoder.security.trust-level=ask-destructive
eurocoder.security.sandbox.enabled=true

# Benchmark defaults
eurocoder.benchmark.results-dir=${user.home}/.eurocoder/benchmark-results
